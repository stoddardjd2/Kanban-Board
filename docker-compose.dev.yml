services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ravenna
      POSTGRES_PASSWORD: ravenna
      POSTGRES_DB: ravenna
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ravenna -d ravenna"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: node:22-alpine
    working_dir: /app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://ravenna:ravenna@postgres:5432/ravenna
      PORT: "3001"
      LOG_LEVEL: info
      NODE_ENV: development
      FRONTEND_URL: http://localhost:5173
    command:
      [
        "sh",
        "-c",
        "if [ ! -d node_modules/.bin ]; then npm ci; fi && npx prisma generate --schema backend/prisma/schema.prisma && npm run dev -w backend",
      ]
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    working_dir: /app
    restart: unless-stopped
    environment:
      NODE_ENV: development
      VITE_API_URL: http://localhost:3001
      CHOKIDAR_USEPOLLING: "true"
    command:
      [
        "sh",
        "-c",
        "if [ ! -d node_modules/.bin ]; then npm ci; fi && npm run dev -w frontend -- --host 0.0.0.0",
      ]
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:
